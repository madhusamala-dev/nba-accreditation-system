          type: string
        instituteName:
          type: string
        yearOfEstablishment:
          type: string
        location:
          type: string
        city:
          type: string
        state:
          type: string
        pinCode:
          type: string
        website:
          type: string
        email:
          type: string
        phone:
          type: string
        headName:
          type: string
        headDesignation:
          type: string
        headAppointmentStatus:
          type: string
        headMobile:
          type: string
        headTelephone:
          type: string
        headEmail:
          type: string
        universityName:
          type: string
        universityCity:
          type: string
        universityState:
          type: string
        universityPinCode:
          type: string
        institutionType:
          type: string
        institutionTypeOther:
          type: string
        ownershipStatus:
          type: string
        ownershipStatusOther:
          type: string
        numUGPrograms:
          type: string
        numPGPrograms:
          type: string
        programsOffered:
          type: array
          items:
            $ref: '#/components/schemas/ProgramOffered'
        programsForAccreditation:
          type: array
          items:
            $ref: '#/components/schemas/ProgramForAccreditation'
        alliedDepartments:
          type: array
          items:
            $ref: '#/components/schemas/AlliedDepartment'
        programDetails:
          type: array
          items:
            $ref: '#/components/schemas/ProgramDetail'
        facultyDetails:
          type: array
          items:
            $ref: '#/components/schemas/FacultyRow'
        facultyDepartmentName:
          type: string
        numAlliedDepartments:
          type: string
        numUGEnggPrograms:
          type: string
        numPGEnggPrograms:
          type: string
        facultyCadre:
          type: array
          items:
            $ref: '#/components/schemas/FacultyCadreRow'
        hodName:
          type: string
        hodAppointment:
          type: string
        hodQualification:
          type: string
        hodQualificationOther:
          type: string
        sfrData:
          $ref: '#/components/schemas/SFRData'
        complianceStatus:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceRow'

    PreQualifierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        institutionId:
          type: integer
          format: int64
        institutionName:
          type: string
        status:
          type: string
          enum: [DRAFT, IN_PROGRESS, SUBMITTED]
        completionPercentage:
          type: integer
        lastModified:
          type: string
          format: date-time
        submittedAt:
          type: string
          format: date-time
          nullable: true
        programAppliedFor:
          type: string
        instituteName:
          type: string

    PreQualifierDetailResponse:
      allOf:
        - $ref: '#/components/schemas/PreQualifierResponse'
        - type: object
          properties:
            yearOfEstablishment:
              type: string
            location:
              type: string
            city:
              type: string
            state:
              type: string
            pinCode:
              type: string
            website:
              type: string
            email:
              type: string
            phone:
              type: string
            headName:
              type: string
            headDesignation:
              type: string
            headAppointmentStatus:
              type: string
            headMobile:
              type: string
            headTelephone:
              type: string
            headEmail:
              type: string
            universityName:
              type: string
            universityCity:
              type: string
            universityState:
              type: string
            universityPinCode:
              type: string
            institutionType:
              type: string
            institutionTypeOther:
              type: string
            ownershipStatus:
              type: string
            ownershipStatusOther:
              type: string
            numUGPrograms:
              type: string
            numPGPrograms:
              type: string
            programsOffered:
              type: array
              items:
                $ref: '#/components/schemas/ProgramOffered'
            programsForAccreditation:
              type: array
              items:
                $ref: '#/components/schemas/ProgramForAccreditation'
            alliedDepartments:
              type: array
              items:
                $ref: '#/components/schemas/AlliedDepartment'
            programDetails:
              type: array
              items:
                $ref: '#/components/schemas/ProgramDetail'
            facultyDetails:
              type: array
