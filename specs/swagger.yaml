            facultyDepartmentName:
              type: string
            numAlliedDepartments:
              type: string
            numUGEnggPrograms:
              type: string
            numPGEnggPrograms:
              type: string
            facultyCadre:
              type: array
              items:
                $ref: '#/components/schemas/FacultyCadreRow'
            hodName:
