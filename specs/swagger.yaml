        - type: object
          properties:
            criteria:
              type: array
              items:
                $ref: '#/components/schemas/CriteriaDetailResponse'

    PagedSARApplicationResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SARApplicationResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    # ---- Criteria Schemas ----
    CriteriaResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        criteriaNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        maxMarks:
          type: number
        completedSections:
          type: integer
        totalSections:
          type: integer
        totalMarks:
          type: number
        obtainedMarks:
          type: number

    CriteriaDetailResponse:
      allOf:
        - $ref: '#/components/schemas/CriteriaResponse'
        - type: object
          properties:
            sections:
              type: array
              items:
                $ref: '#/components/schemas/SectionResponse'

    # ---- Section Schemas ----
    UpdateSectionRequest:
      type: object
      properties:
        content:
          type: string
          description: Rich text HTML content
        instituteMarks:
          type: number
        isCompleted:
