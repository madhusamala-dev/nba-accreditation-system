            hodAppointment:
              type: string
            hodQualification:
              type: string
            hodQualificationOther:
              type: string
            sfrData:
              $ref: '#/components/schemas/SFRData'
            complianceStatus:
              type: array
              items:
                $ref: '#/components/schemas/ComplianceRow'

    PagedPreQualifierResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PreQualifierResponse'
        totalElements:
          type: integer
          format: int64
