<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #1a56db;">Password Reset Request</h2>
    <p>Dear <span th:text="${name}">User</span>,</p>
    <p>We received a request to reset your password. Click the link below to set a new password:</p>
    <p><a th:href="${resetLink}" style="background: #1a56db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Reset Password</a></p>
    <p>This link will expire in 24 hours. If you did not request this, please ignore this email.</p>
    <hr style="border: 1px solid #e5e7eb;"/>
    <p style="color: #6b7280; font-size: 12px;">CompliEdu NBA Accreditation System</p>
</div>
</body>
</html>
